name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Lint and TypeCheck
  # ============================================
  lint-and-typecheck:
    name: Lint and TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeCheck
        run: bun run typecheck

  # ============================================
  # Unit Tests with Coverage
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bunx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: false
          verbose: true

  # ============================================
  # Build Verification (without full electron-builder)
  # ============================================
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Cache Electron build output
        uses: actions/cache@v4
        with:
          path: |
            out
            .cache
          key: electron-out-${{ runner.os }}-${{ hashFiles('src/**/*', 'package.json', 'bun.lock') }}
          restore-keys: |
            electron-out-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          test -d out/main && echo "Main process built successfully"
          test -d out/preload && echo "Preload built successfully"
          test -d out/renderer && echo "Renderer built successfully"
          echo "Build verification complete!"

  # ============================================
  # E2E Tests (only on main/master push)
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: macos-14
    timeout-minutes: 30
    needs: [lint-and-typecheck, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app for testing
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/results/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: tests/report/
          retention-days: 7
